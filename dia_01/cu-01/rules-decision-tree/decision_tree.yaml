# Base de conocimiento — CU-01 Árbol de decisión (v2)
#
# Tipos de nodo:
#   - "question"  : Bifurcaciones del árbol de decisión.
#   - "deep_dive" : Cuestionario profundo de un servicio. Todas sus preguntas
#                   se resuelven en una sola fase INTERVIEW y apuntan siempre
#                   al mismo result vía el campo `next`.
#   - "result"    : Recomendación final con schema estructurado:
#                     summary           → descripción corta del servicio
#                     why_factors       → lista atómica de factores para que
#                                         el LLM arme un racional personalizado
#                     key_considerations → consideraciones operativas
#                     pricing           → dict {model, notes, example_monthly_usd}
#                     docs_url          → link a la doc oficial
#                     handoff           → payload para el siguiente agente (CU-02)

nodes:

  # ============================================================
  # PREGUNTAS (TRIAGE)
  # ============================================================

  - _id: node_start
    type: question
    question: "¿Es una aplicación nueva?"
    context: "Ayuda a identificar el modelo de ejecución más adecuado."
    options:
      - label: "Si, es una aplicacion nueva"
        next: node_nano_servicios_check
      - label: "No, esta aplicacion ya existe"
        next: node_migracion

  - _id: node_nano_servicios_check
    type: question
    question: "¿La aplicacion puede ser descompuesta en nano servicios?"
    context: "Facilita saber si puede ser desplegada como nano servicios que son segmentos de codigo de tarea especificas, de corta ejecucion y basado en eventos"
    options:
      - label: "Si, se puede descomponer en pequeños nano servicios"
        next: deep_functions
      - label: "No es posible"
        next: node_app_services_check

  - _id: node_app_services_check
    type: question
    question: "¿La aplicacion requiere de los servicios de una plataforma web?"
    context: "Permite conocer si es una aplicación web o una aplicacion contenerizada"
    options:
      - label: "Sí, se requiere una web app"
        next: deep_app_services
      - label: "No, no se requiere una plataforma web"
        next: node_container_instance_check

  - _id: node_container_instance_check
    type: question
    question: "¿La aplicacion requiere escalado, equilibrio de carga y soporte de multiples contenedores?"
    context: "Nos ayuda a identificar si es necesario tener un nivel escalado, soporte de carga y orquestacion"
    options:
      - label: "Sí, requiere caracteristicas de escalado y load balancing avanzadas"
        next: node_container_apps_check
      - label: "No requiere estas caracteristicas"
        next: deep_container_instances

  - _id: node_container_apps_check
    type: question
    question: "¿Se necesita acceso a las APIs de Kubernetes y a su plano de control"
    context: "Facilita reconocer si es posible utilizar un servicio serverless de Kubernetes"
    options:
      - label: "Sí se necesita acceso a las APIs de Kubernetes"
        next: node_openshift_check
      - label: "No es necesario, se puede ejecutar en un servicio serverless"
        next: deep_container_apps

  - _id: node_openshift_check
    type: question
    question: "¿Usa Red Hat Openshift Container Platform?"
    context: "Define si se necesita Openshift o si se puede ejecutar sobre AKS"
    options:
      - label: "Sí, utiliza Openshift"
        next: deep_openshift
      - label: "No necesita Openshift"
        next: deep_aks

  - _id: node_migracion
    type: question
    question: "¿Es una aplicación que se va a migrar?"
    context: "Permite conocer si es una aplicación a optimizar siguiendo la metodologia de los 12 factores"
    options:
      - label: "Sí, voy a migrarla"
        next: node_nano_servicios_check
      - label: "No"
        next: node_vm_check

  - _id: node_vm_check
    type: question
    question: "¿La aplicación usa alguna tecnología legada (C++, EJB, ASP o similar)?"
    context: "Ayuda a entender si la aplicación puede ser transferida sin realizar modificaciones y optimizaciones significativas"
    options:
      - label: "Sí, utiliza un stack legado (framework, lenguaje o tecnologia)"
        next: deep_vm
      - label: "No"
        next: node_container

  - _id: node_container
    type: question
    question: "¿Puede ser contenerizada?"
    context: "Ayuda a reconocer si dicha aplicación puede desplegarse como container"
    options:
      - label: "Sí, la aplicación puede contenerizarse"
        next: node_nano_servicios_check
      - label: "No"
        next: node_web_app_distribuida

  - _id: node_web_app_distribuida
    type: question
    question: "¿Esta aplicacion puede ser distribuida como una coleccion de componentes que juntos constituyen una aplicacion web?"
    context: "Define si la aplicación es una web app de componentes distribuidos o un stack monolitico"
    options:
      - label: "Sí es una web app distribuida"
        next: deep_app_services
      - label: "No es distribuida"
        next: deep_vm

  # ============================================================
  # DEEP DIVES (INTERVIEW)
  # ============================================================

  # Azure Functions
  - _id: deep_functions
    type: deep_dive
    service: "Azure Function App"
    next: result_function_app
    sections:

      - section: "Propósito y Uso"
        questions:
          - id: proposito_uso
            text: "¿Para qué vas a usar Azure Function?"
            hint: "Ejemplos: transformar datos en tiempo real, procesar archivos subidos, programar tareas, procesar eventos"

          - id: ejecucion_constante
            text: "¿Necesitás una ejecución constante o puede ser event-driven?"

          - id: procesos_complejos
            text: "¿Necesitás ejecutar procesos complejos que requieran estado, coordinación o dependencias temporales?"
            hint: "Si la respuesta es Sí, probablemente necesites Durable Functions"

          - id: subtareas_paralelas
            text: "¿Necesitás dividir una tarea en múltiples subtareas paralelas y consolidar los resultados al final?"
            required: false

          - id: eventos_externos
            text: "¿Necesitás recibir eventos externos antes de completar el proceso?"
            required: false

      - section: "Plan de Hosting"
        questions:
          - id: latencia_arranque
            text: "¿Qué tan rápido necesitás que se ejecute la función? ¿Cuánto tráfico o volumen de eventos esperás recibir?"

          - id: cold_start
            text: "¿Los tiempos de inicio en frío son un problema? ¿Necesitás evitar tiempos de inicio en frío?"
            hint: "En caso de que si considerar Premium Plan"

          - id: escala_automatica
            text: "¿Necesitás que la función escale automáticamente según la demanda? ¿Cuántas ejecuciones simultáneas esperás manejar?"

          - id: vnet_premium
            text: "¿Vas a necesitar integración con una VNET o características avanzadas que solo están en el plan Premium?"
            hint: >
              Planes disponibles:
              Consumption (pay-per-use, escala automática),
              Premium (better performance, sin inicio frío),
              Dedicated (constant availability, costos elevados)

      - section: "Integraciones y Triggers"
        questions:
          - id: trigger_tipo
            text: "¿Qué evento activará tu función?"
            hint: "HTTP, Timer, Event Hub, Blob Storage, Queue, CosmosDB, Kafka, etc."

          - id: bindings
            text: "¿Necesitás que tu función interactúe con otros servicios de Azure mediante bindings?"
            hint: "Event Grid, Logic Apps, API Management, Azure Cosmos DB, Service Bus, etc."
            required: false

      - section: "Lenguaje y Desarrollo"
        questions:
          - id: lenguaje
            text: "¿En qué lenguaje de programación se desarrollará la función?"
            hint: "C#, JavaScript/TypeScript, Python, Java, PowerShell, Go"

          - id: debug_local
            text: "¿Cómo vas a depurar y probar la función localmente?"
            required: false

          - id: codigo_fuente
            text: "¿Dónde reside el código fuente?"
            hint: "GitHub, Azure DevOps, GitLab, local"

          - id: cicd
            text: "¿Cómo integrarás la función al flujo de CI/CD?"
            required: false

      - section: "Seguridad y Cumplimiento"
        questions:
          - id: autenticacion
            text: "¿Cómo se autenticará el acceso a la función?"
            hint: "Managed Identity, API Key, OAuth"

          - id: acceso_red
            text: "¿Necesitás restringir el acceso a nivel de red?"
            hint: "VNET, Private Endpoints"
            required: false

          - id: permisos_datos
            text: "¿Cómo se manejarán los permisos sobre los datos accedidos por la función?"

      - section: "Monitoreo y Mantenimiento"
        questions:
          - id: monitoreo
            text: "¿Cómo monitorearás el rendimiento y los errores de la función?"
            hint: "Application Insights, Logs"
            required: false

          - id: alertas
            text: "¿Necesitás establecer alertas en caso de fallos o degradación del servicio?"
            required: false

          - id: recuperacion
            text: "¿Qué estrategias de recuperación aplicarás si la función falla?"
            required: false

      - section: "Persistencia y Estado"
        questions:
          - id: estado
            text: "¿La función necesita mantener estado o puede ser completamente stateless?"

          - id: durable_functions
            text: "¿Vas a necesitar Durable Functions para gestionar flujos de trabajo o coordinación de eventos?"

          - id: almacenamiento
            text: "¿Dónde almacenarás la información que necesite persistir?"
            hint: "CosmosDB, Blob Storage, etc."


  # Azure Virtual Machines
  - _id: deep_vm
    type: deep_dive
    service: "Azure Virtual Machines"
    next: result_vm
    sections:

      - section: "Propósito y Uso"
        questions:
          - id: vm_proposito
            text: "¿Para qué vas a usar la VM?"
            hint: "Aplicaciones empresariales, bases de datos, procesamiento de datos, etc."

          - id: vm_criticidad
            text: "¿Es una carga de trabajo crítica o puede tolerar tiempos de inactividad?"

      - section: "Escalabilidad y Disponibilidad"
        questions:
          - id: vm_carga_variable
            text: "¿La carga de trabajo varía en el tiempo o es estable?"

          - id: vm_autoscaling
            text: "¿Vas a usar escalado automático?"

          - id: vm_disponibilidad
            text: "¿Requerís disponibilidad en múltiples regiones o zonas?"

      - section: "Red y Seguridad"
        questions:
          - id: vm_trafico_red
            text: "¿Cómo será el tráfico de red?"
            hint: "Interno, externo, mixto"

          - id: vm_load_balancer
            text: "¿Se requiere balanceador de carga o firewall?"

          - id: vm_politicas_seguridad
            text: "¿Qué políticas de seguridad y acceso necesitás aplicar?"

          - id: vm_ip_publica
            text: "¿Requiere una IP pública? ¿Se accederá a través de un bastión?"
            required: false

      - section: "Requisitos de CPU, Memoria y Almacenamiento"
        questions:
          - id: vm_cpu
            text: "¿Qué tan intensivo es el procesamiento?"
            hint: "Ligero, medio, alto, computación intensiva. ¿Cuántos núcleos de CPU necesita tu aplicación?"

          - id: vm_memoria
            text: "¿Qué tan intensivo es el uso de memoria?"
            hint: "Ligero, medio, alto. ¿Cuánta RAM requiere para un funcionamiento óptimo?"

          - id: vm_disco
            text: "¿Qué tipo de disco necesitás?"
            hint: "SSD estándar, SSD premium, HDD"

          - id: vm_almacenamiento
            text: "¿Cuánto almacenamiento requiere tu aplicación? ¿Se requiere almacenamiento persistente o temporal?"

      - section: "Sistema Operativo"
        questions:
          - id: vm_so
            text: "¿Requerís Windows o Linux? ¿Qué versión?"

          - id: vm_imagen
            text: "¿Necesitás una imagen específica o una personalizada?"
            required: false

      - section: "Costo y Licenciamiento"
        questions:
          - id: vm_licencias
            text: "¿Requerís alguna licencia especial?"
            hint: "Windows Server, SQL Server, etc."
            required: false

          - id: vm_reservada
            text: "¿Vas a usar una VM reservada para ahorrar costos a largo plazo?"
            required: false


  # Azure App Services
  - _id: deep_app_services
    type: deep_dive
    service: "Azure App Services"
    next: result_app_services
    sections:

      - section: "Propósito y Uso"
        questions:
          - id: apps_objetivo
            text: "¿Cuál es el objetivo de la aplicación?"

      - section: "Requisitos de la Aplicación"
        questions:
          - id: apps_lenguaje
            text: "¿En qué lenguaje está desarrollada?"
            hint: ".NET, Java, Python, Node.js, PHP o Ruby"

          - id: apps_dependencias
            text: "¿Requiere bases de datos, almacenamiento o integración con otros servicios?"

          - id: apps_env_vars
            text: "¿Necesita variables de entorno o secretos?"
            required: false

          - id: apps_autenticacion
            text: "¿Requiere autenticación con Azure AD, OAuth o JWT?"
            required: false

      - section: "Requisitos de Escalabilidad y Desempeño"
        questions:
          - id: apps_rps
            text: "¿Cuántas solicitudes por segundo debe manejar?"

          - id: apps_usuarios
            text: "¿Cuántos usuarios accederán?"

          - id: apps_latencia
            text: "¿Cuánto tiempo debe tardar la aplicación en responder bajo carga?"

          - id: apps_regiones
            text: "¿Desde qué regiones acceden los usuarios?"
            required: false

          - id: apps_escala
            text: "¿Se ajusta a la demanda o debe estar siempre activo?"
            hint: "Escalamiento automático vs instancias fijas"

          - id: apps_load_balancer
            text: "¿Requiere balanceo de carga entre las instancias de la aplicación?"
            required: false

      - section: "Requisitos de Despliegue y Desarrollo"
        questions:
          - id: apps_codigo_fuente
            text: "¿Dónde reside el código fuente?"

          - id: apps_cicd
            text: "¿Cómo integrarás la aplicación con el flujo de CI/CD?"

          - id: apps_tipo_deploy
            text: "¿Qué tipo de despliegue se realizará?"
            hint: "Basic, Rolling o Blue-Green"

          - id: apps_frecuencia_deploy
            text: "¿Cuántas veces al día o semana se despliega la aplicación?"
            required: false

          - id: apps_slots
            text: "¿Necesita slots de despliegue?"
            hint: "Staging, producción, rollback"
            required: false

      - section: "Requisitos de Seguridad y Cumplimiento"
        questions:
          - id: apps_acceso_red
            text: "¿Requiere acceso privado (VNET) o es público en los servicios de la aplicación?"

          - id: apps_https
            text: "¿Necesita HTTPS con certificados personalizados?"
            required: false

          - id: apps_gateway
            text: "¿Puede ser accedida via un Application Gateway?"
            required: false


  # Azure Red Hat OpenShift
  - _id: deep_openshift
    type: deep_dive
    service: "Azure Red Hat OpenShift (ARO)"
    next: result_openshift
    sections:

      - section: "Requerimientos del Negocio y Casos de Uso"
        questions:
          - id: ocp_objetivo
            text: "¿Cuál es el objetivo principal del uso?"

          - id: ocp_tipo_apps
            text: "¿Qué tipo de aplicaciones se desplegarán?"
            hint: "Microservicios, monolitos, batch jobs, etc."

          - id: ocp_alta_disponibilidad
            text: "¿Se requiere alta disponibilidad o distribución multi-región?"

      - section: "Arquitectura y Configuración del Clúster"
        questions:
          - id: ocp_entornos
            text: "¿Cuántos entornos se necesitan?"
            hint: "Desarrollo, testing, producción, DR"

          - id: ocp_version
            text: "¿Qué versión de OCP se planea utilizar y con qué frecuencia se actualizará?"

          - id: ocp_carga_variable
            text: "¿La carga de trabajo varía en el tiempo o es estable?"

          - id: ocp_lenguaje
            text: "¿En qué lenguaje de programación se desarrollarán los servicios?"

          - id: ocp_computo_intensivo
            text: "¿Se requiere soporte para workloads intensivos en cómputo?"

          - id: ocp_gpu
            text: "¿Se requiere soporte para GPU?"
            required: false

          - id: ocp_trafico
            text: "¿Cuál es el tráfico esperado?"

          - id: ocp_vm_master
            text: "¿Qué tipo de VM deben usarse para los nodos master?"
            required: false

          - id: ocp_vm_workers
            text: "¿Qué tipo de VM deben usarse para los nodos workers? ¿Cuántos workers?"

          - id: ocp_autoscaling_nodos
            text: "¿Se requiere escalado automático de nodos?"

          - id: ocp_almacenamiento
            text: "¿Requiere almacenamiento de datos? ¿Tamaño y tipo?"
            required: false


  # Azure Kubernetes Service
  - _id: deep_aks
    type: deep_dive
    service: "Azure Kubernetes Service (AKS)"
    next: result_aks
    sections:

      - section: "Requerimientos del Negocio y Casos de Uso"
        questions:
          - id: aks_objetivo
            text: "¿Cuál es el objetivo principal del uso?"

          - id: aks_tipo_apps
            text: "¿Qué tipo de aplicaciones se desplegarán?"
            hint: "Microservicios, monolitos, batch jobs, etc."

          - id: aks_alta_disponibilidad
            text: "¿Se requiere alta disponibilidad o distribución multi-región?"

      - section: "Arquitectura y Configuración del Clúster"
        questions:
          - id: aks_entornos
            text: "¿Cuántos entornos se necesitan?"
            hint: "Desarrollo, testing, producción, DR"

          - id: aks_version_k8s
            text: "¿Qué versión de Kubernetes se planea utilizar y con qué frecuencia se actualizará?"

          - id: aks_lenguaje
            text: "¿En qué lenguaje de programación se desarrollarán los servicios?"

          - id: aks_carga_variable
            text: "¿La carga de trabajo varía en el tiempo o es estable?"

          - id: aks_nodepools
            text: "¿Vamos a ejecutar cargas de trabajo en grupos de nodos que comparten las mismas características?"
            hint: "¿Cuántos nodos se necesitan inicialmente para cada grupo?"

          - id: aks_autoscaling_nodos
            text: "¿Se requiere escalado automático de nodos?"

          - id: aks_trafico
            text: "¿Cuál es el tráfico esperado?"

          - id: aks_tipo_vm
            text: "¿Qué tipo de VM deben usarse para los nodos?"
            hint: "General purpose, CPU optimizado, GPU, spot instances"

          - id: aks_gpu
            text: "¿Se requiere soporte para GPU o workloads intensivos en cómputo?"
            required: false

          - id: aks_windows
            text: "¿Se necesita soporte para Windows o solo Linux?"
            required: false

          - id: aks_almacenamiento
            text: "¿Requiere almacenamiento de datos?"
            hint: "Azure Files, Azure Disks, Azure Blob. ¿Tamaño?"
            required: false

      - section: "Redes y Seguridad"
        questions:
          - id: aks_modelo_red
            text: "¿Qué modelo de red se utilizará?"
            hint: "Azure CNI o Kubenet"

          - id: aks_key_vault
            text: "¿Se necesita integración con Azure Key Vault para manejo de secretos?"
            required: false

          - id: aks_exposicion
            text: "¿Se requiere exponer servicios a internet?"
            hint: "Ingress Controller, Load Balancer"

          - id: aks_seguridad_pods
            text: "¿Cómo se manejará la seguridad de los pods?"
            hint: "RBAC, Azure AD, Network Policies"

      - section: "Escalabilidad y Rendimiento"
        questions:
          - id: aks_carga_cluster
            text: "¿Cuál es la carga esperada en el clúster y cómo se manejarán los picos de tráfico?"

          - id: aks_hpa
            text: "¿Se usará Auto-Scaling para los nodos y los pods?"

      - section: "Integración con Otros Servicios de Azure"
        questions:
          - id: aks_observabilidad
            text: "¿Cómo se va a manejar la observabilidad?"
            hint: "Logs, métricas, tracing. Azure Monitor, Prometheus, Grafana"

          - id: aks_bases_datos
            text: "¿Se utilizarán servicios de base de datos en Azure?"
            hint: "Azure SQL, CosmosDB, PostgreSQL"
            required: false

          - id: aks_mensajeria
            text: "¿Se requiere integración con Azure Service Bus, Event Hubs, Kafka, etc.?"
            required: false

      - section: "Despliegue y Operación"
        questions:
          - id: aks_deploy_herramienta
            text: "¿Cómo se desplegarán las aplicaciones?"
            hint: "Helm, Kustomize, ArgoCD, CI/CD"

          - id: aks_estrategia_deploy
            text: "¿Cómo se manejarán las actualizaciones y despliegues en producción?"
            hint: "Blue-Green, Rolling Updates, Canary Deployments"

          - id: aks_registry
            text: "¿Usará un Container Registry para desplegar los servicios? ¿Cuál?"
            required: false


