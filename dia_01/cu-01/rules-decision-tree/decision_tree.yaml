      - section: "Red y Exposición del Servicio"
        questions:
          - id: ca_exposicion
            text: "¿Debe ser accesible desde Internet o solo dentro de una red privada?"

          - id: ca_dominio
            text: "¿Necesita un dominio personalizado o funciona con el dominio de Azure?"
            required: false

          - id: ca_gateway
            text: "¿Se requiere integración con Azure Front Door o API Gateway?"
            required: false

      - section: "Seguridad y Autenticación"
        questions:
          - id: ca_autenticacion
            text: "¿Cómo manejarás la autenticación?"
            hint: "Azure AD, JWT, OAuth2"

          - id: ca_acceso_red
            text: "¿Necesitás control de acceso a nivel de red?"
            hint: "VNET, Private Link, NSG"
            required: false

      - section: "Integración con Otros Servicios"
        questions:
          - id: ca_integracion_azure
            text: "¿Debe interactuar con otros servicios en Azure?"
            hint: "Event Hub, Service Bus, Logic Apps"
            required: false

          - id: ca_monitoreo
            text: "¿Se requiere integración con herramientas de monitoreo y logging?"
            hint: "Azure Monitor, Application Insights"
            required: false

      - section: "Estrategia de Despliegue"
        questions:
          - id: ca_cicd
            text: "¿Cómo se integrará con el flujo de CI/CD y cómo se desplegará?"
            hint: "GitHub Actions, Azure DevOps, Terraform, Bicep"

          - id: ca_zero_downtime
            text: "¿Necesitás actualizaciones sin downtime?"
            hint: "Blue/Green, Canary"
            required: false

      - section: "Costo"
        questions:
          - id: ca_reserva
            text: "¿Puedo realizar una reserva para ahorrar costos a largo plazo?"
            required: false


  # Azure Container Instances
  - _id: deep_container_instances
    type: deep_dive
    service: "Azure Container Instances"
    next: result_container_instances
    sections:

      - section: "Caso de Uso"
        questions:
          - id: aci_proposito
            text: "¿Para qué vas a usar Container Instances?"
            hint: "Tareas puntuales, batch jobs, pipelines, testing, scripts automatizados"

          - id: aci_duracion
            text: "¿Cuánto tiempo dura la ejecución del contenedor?"
            hint: "Segundos, minutos, horas. ¿Se ejecuta una vez o de forma recurrente?"

      - section: "Recursos"
        questions:
          - id: aci_recursos
            text: "¿Cuánta CPU y memoria necesita el contenedor?"

          - id: aci_gpu
            text: "¿Requiere GPU?"
            required: false

      - section: "Red y Acceso"
        questions:
          - id: aci_acceso
            text: "¿El contenedor necesita ser accesible desde internet o solo ejecuta tareas internas?"

          - id: aci_vnet
            text: "¿Necesita integrarse con una VNET?"
            required: false

      - section: "Persistencia"
        questions:
          - id: aci_storage
            text: "¿El contenedor necesita acceder a almacenamiento persistente?"
            hint: "Azure Files, Blob Storage"
            required: false


  # ============================================================
  # RESULTADOS (HANDOFF)
