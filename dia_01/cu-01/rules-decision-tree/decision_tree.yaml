  - _id: result_aks
    type: result
    service: "Azure Kubernetes Service (AKS)"

    summary: >
      Kubernetes totalmente gestionado con control plane gratuito, nodepools
      flexibles y control granular sobre networking, RBAC y workloads.

    why_factors:
      - "el equipo ya maneja Kubernetes o necesita sus APIs"
      - "control granular sobre networking y RBAC"
      - "múltiples tipos de workloads en el mismo cluster"
      - "necesidad de nodepools heterogéneos (GPU, spot, arm64)"
      - "integración con GitOps (Flux, ArgoCD)"
      - "no se requiere el stack comercial de Red Hat (OpenShift)"

    key_considerations:
      - "Control plane gestionado por Azure (gratis), pagás solo los nodos worker"
