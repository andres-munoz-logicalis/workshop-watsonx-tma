  - _id: result_function_app
    type: result
    service: "Azure Function App"

    summary: >
      Compute serverless event-driven con escalado a cero y facturación
      por ejecución. Ideal para cargas discontinuas y stateless.

    why_factors:
      - "carga event-driven"
      - "procesamiento stateless"
      - "volumen de tráfico variable o impredecible"
      - "tiempos de ejecución cortos (menos de 10 minutos)"
      - "se quiere pagar solo por uso real"
      - "no hay requerimiento de control sobre el sistema operativo"
      - "integración nativa con triggers de Azure (Queue, Blob, Event Hub, Timer)"

    key_considerations:
      - "Tiempo máximo de ejecución: 230s en plan Consumption (ilimitado en Premium/Dedicated)"
      - "Cold start puede ser un problema — evaluá Premium si necesitás baja latencia"
      - "Triggers soportados: HTTP, Timer, Queue, Event Hub, Blob, Service Bus"
      - "Integraciones nativas con Logic Apps, API Management, Event Grid"
      - "Durable Functions para workflows con estado o coordinación de eventos"

    pricing:
      model: "consumption"
      notes: "Primeros 1M requests gratis, luego $0.20/M + $0.000016/GB-s."
      example_monthly_usd: 15
      alternatives:
        - plan: "premium"
          notes: "Sin cold start, soporte de VNET, desde ~$150/mes."
        - plan: "dedicated"
          notes: "Corre sobre un App Service Plan existente."

    docs_url: "https://learn.microsoft.com/azure/azure-functions/"

    handoff:
      next_agent: "cu-02-cost-estimator"
      required_inputs:
        - "expected_requests_per_month"
        - "avg_execution_time_ms"
        - "memory_mb"
        - "trigger_tipo"
        - "plan"
      params:
        service: "azure_functions"
        pricing_tier: "consumption"


  - _id: result_app_services
    type: result
    service: "Azure App Services"

    summary: >
      Runtime gestionado para aplicaciones web tradicionales, con escalado
      automático, deployment slots y soporte nativo para los stacks más comunes.

    why_factors:
      - "aplicación web tradicional o API HTTP"
      - "se quiere un runtime gestionado sin operar contenedores ni VMs"
      - "stack estándar (.NET, Node.js, Python, Java, PHP, Ruby)"
      - "necesidad de deployment slots para blue/green o staging"
      - "escalado automático por métricas (CPU, memoria, custom)"
      - "integración directa con Azure DevOps o GitHub Actions out-of-the-box"

    key_considerations:
      - "Soporte nativo para .NET, Node.js, Python, Java, PHP, Ruby"
      - "Deployment slots para blue/green sin downtime"
      - "Autoscale basado en CPU, memoria o métricas customizadas"
      - "Integración con Azure DevOps, GitHub Actions, Bitbucket out-of-the-box"
      - "Application Gateway y Front Door disponibles para exposición avanzada"

    pricing:
      model: "tiered"
      notes: "Desde Free (F1) hasta Premium P3v3. El plan B1 (~$13/mes) es el mínimo productivo."
      example_monthly_usd: 55
      alternatives:
        - plan: "basic"
          notes: "B1/B2/B3, ideal para dev/test y cargas chicas."
        - plan: "standard"
