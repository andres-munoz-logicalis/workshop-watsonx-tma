    why_factors:
      - "se quiere correr contenedores sin operar Kubernetes"
      - "microservicios con tráfico variable"
      - "se quiere escalar a cero en períodos idle"
      - "no se necesita acceso a la API de Kubernetes"
      - "se busca un balance entre control y gestión operativa"
      - "event-driven scaling sobre colas o topics"

    key_considerations:
      - "Basado en Kubernetes + KEDA + Dapr internamente, totalmente abstraído"
      - "Escala a cero nativa — ideal para microservicios con tráfico variable"
      - "Soporte para HTTP scaling y event-driven scaling (queues, topics)"
      - "Dapr integrado para service discovery, pub/sub y state management"
      - "Menos control que AKS, pero muchísimo menos overhead operativo"

    pricing:
