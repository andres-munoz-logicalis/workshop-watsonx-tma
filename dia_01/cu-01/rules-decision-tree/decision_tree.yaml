      - section: "Requisitos de Infraestructura"
        questions:
          - id: ca_contenedores
            text: "¿Qué tipo de contenedores usarás?"
            hint: "Docker, OCI"

          - id: ca_recursos
            text: "¿Cuánta CPU y memoria necesita cada instancia?"

          - id: ca_gpu
            text: "¿Requerís GPU para su procesamiento?"
            required: false

      - section: "Almacenamiento y Persistencia"
        questions:
          - id: ca_persistencia
            text: "¿Necesita persistencia de datos?"
            hint: "Volúmenes montados, Azure Files, Blob Storage"

          - id: ca_base_datos
            text: "¿Requiere una base de datos externa?"
            hint: "Azure Cosmos DB, PostgreSQL, MySQL, SQL Server"
